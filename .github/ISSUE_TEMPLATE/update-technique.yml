name: Update Technique
description: Suggest an update to an existing technique in the threat matrix.
title: "[Update Technique]: "
labels:
  - documentation
body:
  - type: input
    id: technique_id
    attributes:
      label: Technique ID
      description: The existing technique ID, such as DS.01 or RP.03.
      placeholder: DS.01
    validations:
      required: true

  - type: input
    id: technique_name
    attributes:
      label: Technique name
      description: The current name of the technique.
      placeholder: Situational Awareness
    validations:
      required: true

  - type: checkboxes
    id: update_type
    attributes:
      label: What needs to change?
      options:
        - label: Capability level
        - label: Capability status
        - label: Description
        - label: Evidence
        - label: Mitigations
        - label: Other
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed change
      description: Describe the update you want to make.
    validations:
      required: true

  - type: textarea
    id: supporting_evidence
    attributes:
      label: Supporting evidence
      description: Link the paper, report, incident, or evaluation supporting the change.
      placeholder: |
        - Title:
          Authors:
          Year:
          URL:
    validations:
      required: false
